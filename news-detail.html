<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CYRA | NEWS DETAIL</title>
    <meta
      name="description"
      content="AIアーティスト事務所兼クリエイティブスタジオCYRAのNEWS詳細ページです。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html#top" aria-label="CYRA TOP">
        <img
          class="brand-image"
          src="./assets/images/logo/cyra-logo.png.png"
          data-source="./assets/images/logo/cyra-logo.png.png"
          alt="CYRA"
        />
        <span class="brand-tagline">CYBERNETIC YOUTH REALITY AGENCY</span>
      </a>

      <nav id="site-nav" class="site-nav" aria-label="Main navigation">
        <a href="./index.html#top">TOP</a>
        <a href="./index.html#talents">TALENTS</a>
        <a class="is-active" href="./index.html#news">NEWS</a>
        <a href="./index.html#account">ACCOUNT</a>
      </nav>

      <div class="header-actions" aria-label="Social links">
        <a href="#" aria-label="TikTok">♪</a>
        <a href="#" aria-label="X">X</a>
        <a href="#" aria-label="Instagram">◎</a>
        <button
          class="menu-button"
          type="button"
          aria-label="Open menu"
          aria-controls="site-nav"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <main>
      <section
        id="news-detail"
        class="news-detail-section"
        aria-labelledby="news-detail-title"
      >
        <article class="news-detail-inner">
          <figure class="news-detail-image">
            <img id="news-detail-image" alt="" />
          </figure>

          <div class="news-detail-content">
            <div class="news-meta">
              <time id="news-detail-date" datetime=""></time>
              <span id="news-detail-tag" class="news-tag"></span>
            </div>
            <h1 id="news-detail-title">NEWS DETAIL</h1>
            <div id="news-detail-body"></div>
            <a id="news-detail-back" class="outline-button" href="./news.html">
              <span>BACK TO NEWS ARCHIVE</span>
              <span aria-hidden="true">→</span>
            </a>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <a class="footer-logo" href="./index.html#top">CYRA</a>
      <span class="barcode" aria-hidden="true"></span>
      <p>サイバネティック・ユース・リアリティ・エージェンシー</p>
      <p>&copy; <span id="current-year"></span> CYRA. All Rights Reserved.</p>
    </footer>

    <script src="./data/talents.js"></script>
    <script src="./data/news.js"></script>
    <script src="./script.js"></script>
    <script>
      (function () {
        const newsId = new URLSearchParams(window.location.search).get("id");
        const selectedNews = (window.CYRA_NEWS || []).find(
          (item) => item.id === newsId,
        );
        const body = document.querySelector("#news-detail-body");

        if (
          !body ||
          !selectedNews ||
          !Array.isArray(selectedNews.detailBody) ||
          selectedNews.detailBody.length === 0
        ) {
          return;
        }

        const paragraphs = selectedNews.detailBody.map((text) => {
          const paragraph = document.createElement("p");
          paragraph.textContent = text;
          return paragraph;
        });

        body.replaceChildren(...paragraphs);
      })();
    </script>
  </body>
</html>
